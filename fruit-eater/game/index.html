<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Clash - Ecran Géant</title>
    <link rel="stylesheet" href="style.css?v=5" />
  </head>
  <body>

    <div id="hud">
      <div class="hud-team pirate">
        <span class="team-dot pirate" style="background: #cc0000;"></span>
        Pirates : 💀 <span id="deaths-pirate">0</span>
      </div>
      <div id="timer">10:00</div>
      <div class="hud-team monstre">
        <span class="team-dot monstre" style="background: #0055ff;"></span>
        Monstres : 💀 <span id="deaths-monstre">0</span>
      </div>
    </div>

    <div id="arena-wrapper">
      <div id="arena">
        <img id="bg-sea" src="ui/Composition_1_1.gif" alt="mer">
        <img id="bg-islands" src="ui/asset_du_fond.png" alt="iles">
        

        <div class="passerelle hidden" id="passerelle-top"></div>
        <div class="passerelle hidden" id="passerelle-bottom"></div>
        <div id="waiting">En attente de joueurs...</div>
      </div>
    </div>

    <div id="abordage-banner" class="hidden">
      ⚔️ ABORDAGE ! <span id="abordage-countdown"></span>
    </div>

    <div id="countdown-overlay" class="overlay hidden">
      <img id="countdown-image" src="" alt="countdown" style="max-width: 60vw; max-height: 60vh;">
    </div>

    <div id="screen-gameover" class="overlay hidden">
      <div class="gameover-card">
        <h1 id="gameover-title">Fin de la partie !</h1>

        <div class="gameover-scores">
          <div class="gameover-team pirate">
            <span class="team-dot pirate" style="background: #cc0000;"></span>
            Pirates
            <span class="gameover-points" id="final-pirate" style="color: #cc0000;">💀 0</span>
          </div>
          <div class="gameover-vs">VS</div>
          <div class="gameover-team monstre">
            <span class="team-dot monstre" style="background: #0055ff;"></span>
            Monstres
            <span class="gameover-points" id="final-monstre" style="color: #0055ff;">💀 0</span>
          </div>
        </div>

        <div id="gameover-restart">Prochaine partie dans <span id="restart-countdown">30</span>s</div>
      </div>
    </div>

    <button id="btn-restart">⟳ Restart</button>
    <div id="qr-box">
      <div id="qr-code"></div>
      <span id="qr-label">Scannez pour jouer</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="script.js?v=5"></script>
  </body>
</html>
