<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sea Clash - Ecran Géant</title>
  <link rel="stylesheet" href="style.css?v=9" />
</head>

<body>

  <div id="arena-wrapper">
    <div id="arena">
      <img id="bg-sea" src="ui/Composition_1_1.gif" alt="mer">
      <img id="bg-islands" src="ui/asset_du_fond.png" alt="iles">

      <div class="passerelle hidden" id="passerelle-top"></div>
      <div class="passerelle hidden" id="passerelle-bottom"></div>

      <!-- Le nouvel overlay UI au-dessus du jeu -->
      <img id="bg-overlay" src="ui/Asset_du_dessus.png" alt="UI Overlay">

      <!-- Textes positionnés sur l'overlay -->
      <div id="overlay-ui">
        <!-- Score Pirate en haut à gauche -->
        <div id="score-container-pirate">
          <div class="score-text">PIRATES <span id="deaths-pirate" class="score-number">0</span></div>
        </div>

        <!-- Timer en haut au centre -->
        <div id="timer-container">
          <div id="timer" class="timer-text">10:00</div>
        </div>

        <!-- Score Monstre en haut à droite -->
        <div id="score-container-monstre">
          <div class="score-text"><span id="deaths-monstre" class="score-number">0</span> MONSTRES</div>
        </div>

        <!-- QR Code en bas à droite -->
        <div id="qr-container">
          <div id="qr-code"></div>
        </div>
      </div>

      <div id="waiting">
        <div class="waiting-content">
          <img src="/controller/assets/logo-manette.png" alt="Sea Clash" class="waiting-logo">
          <div class="waiting-text">En attente de joueurs...</div>
          <div class="waiting-counter" id="waiting-counter">0 / 2</div>
          <div class="waiting-hint">Scannez le QR code pour rejoindre !</div>
          <div id="waiting-qr" class="waiting-qr"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="abordage-banner" class="hidden">
    <img src="assets/À L'ABORDAGE.png" alt="A l'abordage" class="abordage-popup-img">
  </div>

  <div id="abordage-timer" class="hidden">
    <span id="abordage-countdown">45</span>
  </div>

  <div id="countdown-overlay" class="overlay hidden">
    <img id="countdown-image" src="" alt="countdown" style="max-width: 60vw; max-height: 60vh;">
  </div>

  <div id="screen-gameover" class="overlay hidden">
    <div class="gameover-card">
      <img src="/controller/assets/logo-manette.png" alt="Sea Clash" class="gameover-logo">
      <img id="gameover-title-img" src="assets/win-pirate.png" alt="Victoire" class="win-img">

      <div class="gameover-scores-new">
        <div class="result-ribbon pirate-ribbon" id="ribbon-pirate">
          <span class="ribbon-score" id="final-pirate">0</span>
        </div>
        <div class="result-ribbon monstre-ribbon" id="ribbon-monstre">
          <span class="ribbon-score" id="final-monstre">0</span>
        </div>
      </div>

      <div id="gameover-restart">Prochaine partie dans <span id="restart-countdown">30</span>s</div>
    </div>
  </div>

  <button id="btn-force-end">🏁 Fin express (Debug)</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="script.js?v=5"></script>
</body>

</html>
